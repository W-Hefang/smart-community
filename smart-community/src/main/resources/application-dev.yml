# DEV: 开发版

# yml的特点： yaml
# 语法简单（xml）  键: 值 （如果有赋值操作，必须带一个空格）
# 缩进：体现层级(一般为2个空格/ 4个空格)
#支持数据类型（字符串、数字、bool、数组）

server:
  port: 8080

# =================配置数据源（建立和数据库的连接）=======================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smart_community?characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Root@123456
    #  type: com.alibaba.druid.pool.DruidDataSource  可选，默认会自动配置
    # Druid连接池配置
    druid:
      #------------------------ 连接池核心配置 ------------------------
      initial-size: 5           # 初始化连接数（建议与 min-idle 一致）
      min-idle: 5              # 最小空闲连接数（长期维持的闲置连接）
      max-active: 20           # 最大活跃连接数（根据数据库负载调整）
      max-wait: 60000          # 获取连接最大等待时间（单位：毫秒）
      time-between-eviction-runs-millis: 60000  # 连接保活检测间隔（60秒）
      min-evictable-idle-time-millis: 300000    # 连接最小生存时间（5分钟）
      validation-query: SELECT 1  # 连接有效性验证 SQL（必须与数据库匹配）
      test-while-idle: true    # 空闲时检查连接有效性（推荐开启）
      test-on-borrow: false    # 获取连接时验证（影响性能，不推荐）
      test-on-return: false    # 归还连接时验证（影响性能，不推荐）

      #------------------------ 监控统计拦截配置 ------------------------
      filter:
        stat:
          enabled: true               # 开启统计监控
          log-slow-sql: true         # 记录慢SQL
          slow-sql-millis: 2000      # 慢SQL阈值，超过2秒的SQL会被记录
          merge-sql: true            # 合并SQL，避免相同SQL被统计多次
        wall:
          enabled: true               # 开启防火墙监控
          config:
            multi-statement-allow: true  # 允许一次性执行多条SQL（谨慎使用）

      #------------------------ Druid监控页面配置 ------------------------
      stat-view-servlet:
        enabled: true               # 开启监控页面
        url-pattern: /druid/*       # 监控页面访问路径
        reset-enable: false         # 是否允许重置统计数据
        login-username: admin       # 监控页面登录用户名
        login-password: admin123    # 监控页面登录密码

      #------------------------ Web应用监控配置 ------------------------
      web-stat-filter:
        enabled: true               # 开启Web应用监控
        url-pattern: /*             # 监控所有请求
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"  # 排除静态资源

# =================配置MyBatis-plus=======================
# MyBatis-plus 沿用了Mybatis的配置
# Mybatis是持久层框架,Mybatis-plus是基于Mybatis的插件技术
mybatis-plus:
  type-aliases-package: edu.xcc.smartcommunity.entity  # 配置别名所在的包
  mapper-locations: classpath*:mapper/**/*.xml # 丛指定的位置找到所有的mapper的xml文件
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 指定日志打印器,在mybatis执行的时候输入sql语句
    map-underscore-to-camel-case: true  # user_id -> userId , 开启下划线->小驼峰的自动映射
    return-instance-for-empty-row: true # 当数据表记录不存在,返回NULL对象,否则会报异常
